<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9566F2"/>
      <stop offset="100%" stop-color="#1F74EC"/>
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E8DDFB"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg-grad)"/>

  <!-- Connection lines (outer ring) -->
  <polygon
    points="256,130 366,195 366,325 256,390 146,325 146,195"
    fill="none"
    stroke="white"
    stroke-width="2"
    stroke-opacity="0.15"
  />

  <!-- Connection lines from center to nodes -->
  <line x1="256" y1="260" x2="256" y2="130" stroke="white" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="256" y1="260" x2="366" y2="195" stroke="white" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="256" y1="260" x2="366" y2="325" stroke="white" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="256" y1="260" x2="256" y2="390" stroke="white" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="256" y1="260" x2="146" y2="325" stroke="white" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="256" y1="260" x2="146" y2="195" stroke="white" stroke-width="2.5" stroke-opacity="0.35"/>

  <!-- Cross connections for network density -->
  <line x1="256" y1="130" x2="366" y2="195" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>
  <line x1="366" y1="195" x2="366" y2="325" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>
  <line x1="146" y1="195" x2="256" y2="130" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>
  <line x1="146" y1="325" x2="146" y2="195" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>
  <line x1="256" y1="390" x2="366" y2="325" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>
  <line x1="146" y1="325" x2="256" y2="390" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>

  <!-- Data flow accent lines (ascending) -->
  <line x1="256" y1="260" x2="310" y2="175" stroke="white" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="310" y1="175" x2="330" y2="155" stroke="white" stroke-width="3" stroke-opacity="0.7" stroke-linecap="round"/>
  <!-- Arrow tip -->
  <polygon points="330,145 340,162 322,160" fill="white" fill-opacity="0.7"/>

  <!-- Outer nodes -->
  <circle cx="256" cy="130" r="18" fill="white" fill-opacity="0.9"/>
  <circle cx="366" cy="195" r="18" fill="white" fill-opacity="0.9"/>
  <circle cx="366" cy="325" r="16" fill="white" fill-opacity="0.8"/>
  <circle cx="256" cy="390" r="16" fill="white" fill-opacity="0.8"/>
  <circle cx="146" cy="325" r="16" fill="white" fill-opacity="0.8"/>
  <circle cx="146" cy="195" r="18" fill="white" fill-opacity="0.9"/>

  <!-- Center node (the "SuperGerente" — larger, brighter, with glow) -->
  <circle cx="256" cy="260" r="36" fill="white" fill-opacity="0.15" filter="url(#glow)"/>
  <circle cx="256" cy="260" r="28" fill="white"/>
  <circle cx="256" cy="260" r="16" fill="url(#bg-grad)"/>
</svg>
